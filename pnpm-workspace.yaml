packages:
  - "apps/*"
  - "packages/*"
  - "Landing page"

allowBuilds:
  '@biomejs/biome': true
  esbuild: true
  isolated-vm: true
  lefthook: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true

# Force a single ioredis version across the workspace
# BullMQ bundles its own; without this, types are incompatible across packages
overrides:
  ioredis: 5.11.1
