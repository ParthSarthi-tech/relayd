name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  DATABASE_URL: postgres://relay:relay@localhost:5432/relay_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci-test-secret-that-is-at-least-32-chars-long

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay
          POSTGRES_DB: relay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install

      - run: pnpm typecheck:all
        name: Typecheck all packages

      - run: pnpm --filter @relay/db check
        name: Verify DB migrations match schema

      - run: pnpm --filter @relay/db migrate
        name: Apply migrations to test database

      - run: pnpm test:all
        name: Run all tests

      - run: pnpm build
        name: Build all packages
