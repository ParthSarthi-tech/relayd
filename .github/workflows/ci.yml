name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  DATABASE_URL: postgres://relay:relay@localhost:5432/relay_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci-test-secret-that-is-at-least-32-chars-long

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:

      - name: Start Postgres
        run: |
          for i in 1 2 3; do
            docker run -d \
              --name postgres \
              -e POSTGRES_USER=relay \
              -e POSTGRES_PASSWORD=relay \
              -e POSTGRES_DB=relay_test \
              -p 5432:5432 \
              docker.io/library/postgres:16-alpine \
              -c 'max_connections=200' && break
            echo "Postgres pull/start failed (attempt $i/3), waiting 5s..."
            sleep 5
          done
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -q 2>/dev/null; then
              echo "Postgres is ready"
              break
            fi
            sleep 1
          done

      - name: Start Redis
        run: |
          for i in 1 2 3; do
            docker run -d \
              --name redis \
              -p 6379:6379 \
              docker.io/library/redis:7-alpine && break
            echo "Redis pull/start failed (attempt $i/3), waiting 5s..."
            sleep 5
          done
          for i in $(seq 1 30); do
            if docker exec redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready"
              break
            fi
            sleep 1
          done

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install

      - run: pnpm typecheck:all
        name: Typecheck all packages

      - run: pnpm --filter @relay/db check
        name: Verify DB migrations match schema

      - run: pnpm --filter @relay/db migrate
        name: Apply migrations to test database

      - run: pnpm test:all
        name: Run all tests

      - run: pnpm build
        name: Build all packages
