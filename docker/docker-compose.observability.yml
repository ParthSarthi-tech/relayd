name: relay

# Observability stack for Relay
# Adds Prometheus (metrics), Tempo (traces), and Grafana (visualization)
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.observability.yml up -d

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: relay-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - api
      - worker
    networks:
      - relay-net

  tempo:
    image: grafana/tempo:latest
    container_name: relay-tempo
    restart: unless-stopped
    command:
      - "-config.file=/etc/tempo.yml"
    volumes:
      - ./tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4318:4318"
    networks:
      - relay-net

  grafana:
    image: grafana/grafana:latest
    container_name: relay-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      - prometheus
      - tempo
    networks:
      - relay-net

volumes:
  prometheus-data:
    driver: local
  tempo-data:
    driver: local
  grafana-data:
    driver: local
