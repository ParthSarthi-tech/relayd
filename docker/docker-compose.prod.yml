name: relay

# Production deployment stack
# Services: Postgres, Redis, API, Worker, Dashboard, Caddy (reverse proxy with auto-TLS)

services:
  postgres:
    image: postgres:16-alpine
    container_name: relay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-relay}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-relay}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - relay-postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-relay} -d ${DB_NAME:-relay}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - relay-net

  redis:
    image: redis:7-alpine
    container_name: relay-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --save 60 1000
      --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - relay-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - relay-net

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    container_name: relay-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - relay-net

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: worker
    container_name: relay-worker
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - relay-net

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dashboard
    container_name: relay-dashboard
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - relay-net

  caddy:
    image: caddy:alpine
    container_name: relay-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - dashboard
    networks:
      - relay-net

volumes:
  relay-postgres-data:
    driver: local
  relay-redis-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  relay-net:
    driver: bridge
