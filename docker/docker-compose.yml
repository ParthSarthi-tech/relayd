name: relay

# Production-grade local development stack
# Services: Postgres (primary DB), Redis (queues, rate limits, idempotency), MailHog (email testing)
# API and worker run on the host (via `pnpm dev`) for hot reload — not containerized in dev.

services:
  postgres:
    image: postgres:16-alpine
    container_name: relay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - relay-postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - relay-net

  redis:
    image: redis:7-alpine
    container_name: relay-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - relay-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - relay-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: relay-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    networks:
      - relay-net

volumes:
  relay-postgres-data:
    driver: local
  relay-redis-data:
    driver: local

networks:
  relay-net:
    driver: bridge
